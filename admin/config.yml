backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "categories"
    label: "Portfolio Categories"
    files:
      - file: "data/categories.json"
        label: "Categories"
        name: "categories"
        fields:
          - label: "Categories"
            name: "categories"
            widget: "list"
            summary: "{{name}}"
            fields:
              - label: "Category Name"
                name: "name"
                widget: "string"
                hint: "Shown as the button label on the homepage, e.g. 'Food Brands'"
              - label: "URL Slug"
                name: "slug"
                widget: "string"
                hint: "Lowercase, no spaces, dashes only — e.g. 'food-brands'. Don't change this after adding designs, or the category's link breaks."
              - label: "Icon"
                name: "icon"
                widget: "select"
                hint: "Pick whichever fits closest — doesn't have to be literal."
                options:
                  - { label: "Food / Fork", value: "food" }
                  - { label: "Finance / Coin", value: "finance" }
                  - { label: "Church / Cross", value: "church" }
                  - { label: "Tech / Chip", value: "tech" }
                  - { label: "Camera", value: "camera" }
                  - { label: "Star", value: "star" }
                  - { label: "Palette / Design", value: "palette" }
                  - { label: "Tag / Generic", value: "tag" }
              - label: "Designs"
                name: "items"
                widget: "list"
                summary: "{{title}} — {{type}}"
                fields:
                  - { label: "Image", name: "img", widget: "image" }
                  - { label: "Title / Client", name: "title", widget: "string" }
                  - { label: "Design Type", name: "type", widget: "string" }
                  - { label: "Tall image (3:4 instead of square)", name: "tall", widget: "boolean", default: false }
